
# version: "3.9" Não é mais necessária nas versões modernas do Docker.

services:

  db:
    image: postgres:15
    container_name: nutrisnap_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nutrisnap_network


  redis:
    image: redis:7
    container_name: nutrisnap_redis
    restart: unless-stopped
    networks:
      - nutrisnap_network


  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: nutrisnap_web
    restart: unless-stopped
    # command: gunicorn nutrisnap.wsgi:application --bind 0.0.0.0:8000
    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn nutrisnap.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - ./src:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - nutrisnap_network


  celery:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: nutrisnap_celery
    restart: unless-stopped
    command: celery -A nutrisnap worker -l info
    # volumes:
    #   - ./src:/app
    volumes:
      - ./src:/app
      - media_volume:/app/media        # 🔥 ADICIONE ISSO
      - static_volume:/app/staticfiles # (opcional mas bom manter igual ao web)
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - nutrisnap_network


  nginx:
    image: nginx:latest
    container_name: nutrisnap_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    networks:
      - nutrisnap_network


volumes:
  postgres_data:
  static_volume:
  media_volume:


networks:
  nutrisnap_network:
    driver: bridge